<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Admission Form</title>
</head>
<body>

    <h1 align="center">SITM admission form</h1>

    <form>

        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <label>Father's Name:</label><br>
        <input type="text" name="fathername"><br><br>

        <label>Mother's Name:</label><br>
        <input type="text" name="mothername"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <label>Select Course:</label><br>
        <select>
            <option>B.Tech CSE core</option>
            <option>B.Tech CSE with specialization in AI & ML</option>
            <option>B.Tech CSE with specialization in Cyber Security</option>
            <option>BCA</option>
            <option>BBA</option>
        </select>
        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
